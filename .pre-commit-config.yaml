# Pre-commit hooks for debrief-tools.
# Install locally:
#   brew install pre-commit gitleaks
#   pre-commit install
#
# What runs:
#   - gitleaks: scans staged diff for secrets before the commit lands
#
# Bypass (only for emergencies — CI will still catch it):
#   git commit --no-verify
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        name: gitleaks (scan staged diff for secrets)
