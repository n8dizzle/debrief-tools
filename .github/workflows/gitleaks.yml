name: Secret Scan

on:
  pull_request:
  push:
    branches: [main]

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # PR: full history for diff scans. Push: shallow is fine since we only
          # scan the newly-pushed commits.
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Uses .gitleaks.toml at repo root for rules + allowlist.
          GITLEAKS_ENABLE_COMMENTS: "true"
          GITLEAKS_ENABLE_SUMMARY: "true"
